      - run: composer update --no-interaction --no-progress

      - run: mysql -h 127.0.0.1 -u root mydb < tests/Fixtures/database.sql

      - run: make tests

  lowest:
    name: "Tests on lowest dependencies"
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: mydb
        ports:
          - 3306:3306
